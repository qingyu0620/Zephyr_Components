# 声明要使用的模块, 运行 zpull 自动拉取并递归解析依赖
# sparse: 只拉取列出的子目录 (路径相对于仓库根目录)
# always: 无论拉什么都会包含的骨架路径
# shallow: 骨架模式下只拉文件不拉子目录的路径
# 内部依赖 (path: xxx) 会自动追加 sparse checkout
modules:
  - repo: git@github.com:qingyu0620/Zephyr_Components.git
    ref: main
    sparse: [modules/led, modules/key]
    always: [apps, thread, .vscode, src, .clangd, boards, config, prj.conf]
    shallow: [thread]



