# 声明要使用的模块, 运行 mod_init.py 自动拉取并递归解析依赖
# sparse: 只拉取列出的子目录 (路径相对于仓库根目录)
# always: 无论拉什么都会包含的路径 (已存在则跳过)
# extract: 将仓库内的目录移动到项目根目录
# 内部依赖 (path: xxx) 会自动追加 sparse checkout
modules:
  - repo: git@github.com:qingyu0620/Zephyr_Components.git
    ref: main
    sparse: [modules/led, modules/key]
    always: [apps, thread, .vscode, src, .clangd, boards, config, prj.conf]
    extract:
      bsp: bsp
      modules: modules
      apps: apps
      thread: thread
      .vscode: .vscode
      src: src
      .clangd: .clangd
      boards: boards
      config: config
      prj.conf: prj.conf



